<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>密码场景记录器</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 15px;
        width: 400px;
      }
      h1 {
        font-size: 18px;
        margin-top: 0;
      }
      .form-group {
        margin-bottom: 10px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
      }
      input[type="text"], input[type="password"] {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        padding: 4px 12px;
        margin-right: 5px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      button:active {
        opacity: .7;
      }
      .btn-primary {
        background-color: #4CAF50;
        color: white;
      }
      .btn-secondary {
        background-color: #2196F3;
        color: white;
      }
      .btn-danger {
        background-color: #f44336;
        color: white;
      }
      .btn-neutral {
        background-color: #9e9e9e;
        color: white;
      }
      .list-item {
        border: 1px solid #ddd;
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 4px;
        position: relative;
      }
      .list-item .description {
      font-weight: bold;
      margin-bottom: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pinned-tag {
      margin-right: 5px;
    }
    .list-item span:last-child {
        font-size: 12px;
        color: #666;
        font-weight: normal;
      }
      .list-item .actions {
        margin-top: 8px;
      }
      .form-actions {
        margin-top: 15px;
      }
      .hidden {
        display: none;
      }
      .top-wrap {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 8px;
      }
      .no-data {
        text-align: center;
      }
      body {
        padding: 8px;
        margin: 0;
      }
      #add-form {
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="top-wrap">
      <button id="add-btn" class="btn-primary">+ 添加</button>
    </div>
    <div id="add-form" class="hidden">
      <div class="form-group">
        <label for="description">描述</label>
        <input type="text" id="description" placeholder="输入场景描述" />
      </div>
      <div class="form-group">
        <label for="key">主键</label>
        <input type="text" id="key" placeholder="输入主键" />
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="输入密码" />
      </div>
      <div class="form-actions">
        <button id="save-btn" class="btn-primary">保存</button>
        <button id="cancel-btn" class="btn-neutral" style="display: none;">
          取消
        </button>
      </div>
    </div>

    <div id="list-container">
      <div id="list"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
